services:
  postgres:
    image: postgres:16
    container_name: rma_postgres
    environment:
      POSTGRES_USER: rma
      POSTGRES_PASSWORD: rma
      POSTGRES_DB: rma
    ports:
      - "5432:5432"
    volumes:
      - rma_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rma_redis
    ports:
      - "6379:6379"

volumes:
  rma_pg: